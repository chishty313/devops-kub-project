# Apply with:
#   kubectl apply -f k8s/argocd-application.yaml -n argocd
#
# Assumes ArgoCD is installed in the `argocd` namespace and has read access to
# the GitHub repo below. Edit `repoURL` and `targetRevision` before applying.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: laravel-k8s
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/chishty313/devops-kub-project.git
    targetRevision: main
    path: helm/laravel-k8s
    helm:
      releaseName: laravel
      # Override values from a separate file in the same repo.
      # Create k8s/argocd-values.yaml (or similar) with non-secret overrides.
      valueFiles:
        - ../../helm/laravel-k8s/values.yaml
      # Sensitive values (APP_KEY, etc.) should come from a Kubernetes Secret
      # mounted by something like sealed-secrets, sops-secrets-operator, or
      # external-secrets. NEVER commit the real APP_KEY to git.

  destination:
    server: https://kubernetes.default.svc
    namespace: laravel

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 5
