# /etc/nginx/nginx.conf
#
# Pure-TCP passthrough from the host's public 80/443 to the worker nodes'
# ingress-nginx NodePorts. By design we do NO HTTP-level work here:
#   - cert-manager + ingress-nginx terminate TLS *inside* the cluster,
#   - SNI routing happens in ingress-nginx,
#   - the host nginx is a dumb Layer-4 forwarder.
#
# Replace WORKER1_IP / WORKER2_IP with the actual multipass IPs (the
# `scripts/25-setup-host-nginx.sh` script does this automatically).

user www-data;
worker_processes auto;
pid /run/nginx.pid;
events { worker_connections 4096; }

stream {
    log_format proxy '$remote_addr [$time_local] $protocol $status '
                     '$bytes_sent $bytes_received $session_time '
                     '"$upstream_addr" "$upstream_bytes_sent" "$upstream_bytes_received"';
    access_log /var/log/nginx/stream-access.log proxy buffer=32k flush=5s;
    error_log  /var/log/nginx/stream-error.log warn;

    # Upstream pools — both worker NodePorts, equal weight, with health checks.
    upstream k8s_http {
        least_conn;
        server WORKER1_IP:30080 max_fails=3 fail_timeout=10s;
        server WORKER2_IP:30080 max_fails=3 fail_timeout=10s;
    }
    upstream k8s_https {
        least_conn;
        server WORKER1_IP:30443 max_fails=3 fail_timeout=10s;
        server WORKER2_IP:30443 max_fails=3 fail_timeout=10s;
    }

    # Public :80 -> ingress-nginx :30080.
    server {
        listen 80 reuseport;
        listen [::]:80 reuseport;
        proxy_pass        k8s_http;
        proxy_timeout     30s;
        proxy_connect_timeout 5s;
    }

    # Public :443 -> ingress-nginx :30443 (TLS passthrough).
    server {
        listen 443 reuseport;
        listen [::]:443 reuseport;
        proxy_pass        k8s_https;
        proxy_timeout     60s;
        proxy_connect_timeout 5s;
        # ssl_preread on;  # only needed if we add SNI-based routing on host
    }
}

# Tiny http {} block kept ONLY so nginx -t doesn't complain about no
# http context being defined. Listens on 127.0.0.1:8081 with a single
# /healthz so we can curl from monitoring.
http {
    server {
        listen 127.0.0.1:8081;
        server_name _;
        location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
        location / { return 404; }
    }
}
