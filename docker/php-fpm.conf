; Custom PHP-FPM pool overrides. Loaded as /usr/local/etc/php-fpm.d/zz-app.conf
; (after the default www.conf, so these win).

[www]
user = app
group = app
listen = 127.0.0.1:9000
listen.owner = app
listen.group = app

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Process manager status (handy for debugging)
pm.status_path = /fpm-status
ping.path = /fpm-ping

; Send worker logs to stderr so they reach the container log driver
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
access.log = /dev/stdout
