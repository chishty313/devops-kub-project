# nginx configuration for the Laravel container.
# Runs as the non-root `app` user (UID 1000), listens on :8080.

worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Use stdout/stderr so logs flow to the container log driver.
    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    types_hash_max_size 2048;
    server_tokens off;

    # Allow upstream Ingress to send the real client IP through.
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    client_max_body_size 32m;

    # Tmp paths writable by the `app` user.
    client_body_temp_path /var/lib/nginx/tmp/client_body;
    proxy_temp_path       /var/lib/nginx/tmp/proxy;
    fastcgi_temp_path     /var/lib/nginx/tmp/fastcgi;
    uwsgi_temp_path       /var/lib/nginx/tmp/uwsgi;
    scgi_temp_path        /var/lib/nginx/tmp/scgi;

    upstream php-fpm {
        server 127.0.0.1:9000;
        keepalive 16;
    }

    server {
        listen 8080 default_server;
        server_name _;

        root /var/www/html/public;
        index index.php index.html;

        # Health endpoint should always be cheap and never cached.
        location = /health {
            access_log off;
            try_files $uri /index.php?$query_string;
        }

        # Standard Laravel front controller.
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_read_timeout 60s;
        }

        # Deny access to hidden / sensitive files.
        location ~ /\.(?!well-known).* {
            deny all;
        }
        location ~* /(?:\.env|composer\.(json|lock)|package\.json|artisan)$ {
            deny all;
        }
    }
}
