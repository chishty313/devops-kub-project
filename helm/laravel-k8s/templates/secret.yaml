apiVersion: v1
kind: Secret
metadata:
  name: {{ include "laravel-k8s.secretName" . }}
  namespace: {{ include "laravel-k8s.namespace" . }}
  labels:
    {{- include "laravel-k8s.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.secret.appKey }}
  {{- /* Hard fail at template-time if APP_KEY is missing — Laravel will refuse to boot anyway. */}}
  {{- fail "secret.appKey is required. Generate one with: echo \"base64:$(openssl rand -base64 32)\" and pass via --set or -f secrets.local.yaml" }}
  {{- end }}
  APP_KEY: {{ .Values.secret.appKey | quote }}
  {{- range $k, $v := .Values.secret.extra }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
{{- if .Values.imagePullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imagePullSecret.name }}
  namespace: {{ include "laravel-k8s.namespace" . }}
  labels:
    {{- include "laravel-k8s.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{%q:{"username":%q,"password":%q,"email":%q,"auth":%q}}}`
        .Values.imagePullSecret.registry
        .Values.imagePullSecret.username
        .Values.imagePullSecret.password
        .Values.imagePullSecret.email
        (printf "%s:%s" .Values.imagePullSecret.username .Values.imagePullSecret.password | b64enc)
      | b64enc }}
{{- end }}
