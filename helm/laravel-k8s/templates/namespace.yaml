{{- if .Values.namespace.create -}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "laravel-k8s.namespace" . }}
  labels:
    {{- include "laravel-k8s.labels" . | nindent 4 }}
  {{- with (include "laravel-k8s.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
{{- end -}}
