{{- if .Values.pdb.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "laravel-k8s.fullname" . }}
  namespace: {{ include "laravel-k8s.namespace" . }}
  labels:
    {{- include "laravel-k8s.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "laravel-k8s.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
{{- end -}}
