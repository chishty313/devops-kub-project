{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "laravel-k8s.fullname" . }}
  namespace: {{ include "laravel-k8s.namespace" . }}
  labels:
    {{- include "laravel-k8s.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "laravel-k8s.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the ingress-nginx controller pods.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    # Allow pod-to-pod within the same release (e.g. queue worker -> redis if added).
    - from:
        - podSelector:
            matchLabels:
              {{- include "laravel-k8s.selectorLabels" . | nindent 14 }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow all other egress (databases, registries, external APIs, etc.).
    # Tighten this in production by listing concrete CIDRs / namespaces.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16   # link-local / metadata
{{- end -}}
