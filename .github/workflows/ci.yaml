name: build-and-publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: laravel-k8s

jobs:
  lint:
    name: Lint Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0
      - name: helm lint
        run: helm lint helm/laravel-k8s
      - name: helm template (dry render)
        run: |
          helm template laravel helm/laravel-k8s \
            --set secret.appKey="base64:dGVzdGluZy0xMjM0NTY3ODkwMTIzNDU2Nzg5MA==" \
            --set image.repository=test/laravel-k8s \
            --set image.tag=ci > /tmp/rendered.yaml
          echo "Rendered $(grep -c '^kind:' /tmp/rendered.yaml) Kubernetes objects."

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap Laravel source (composer)
        run: |
          if [ ! -f src/composer.json ]; then
            ./scripts/bootstrap-laravel.sh
          fi

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
